<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/it21-banas/static/css/bootstrap.min.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/it21-banas/">My WSGI App</a>
    </div>
  </nav>

  <!-- Main content -->
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow">
          <div class="card-body text-center p-5">
            <h1 class="card-title display-5 fw-bold">{{ heading }}</h1>
            <p class="card-text text-muted fs-5">{{ message }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="/it21-banas/static/js/bootstrap.bundle.min.js"></script>
</body>
</html>
